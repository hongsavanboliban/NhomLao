<script>
function slideLeft(){
    document.getElementById("slider").scrollBy({
        left: -320,
        behavior: "smooth"
    });
}

function slideRight(){
    document.getElementById("slider").scrollBy({
        left: 320,
        behavior: "smooth"
    });
}
</script>

<script>

function openModal(title,img,text){

document.getElementById("placeModal").style.display="flex";

document.getElementById("modalTitle").innerText=title;

document.getElementById("modalImg").src=img;

document.getElementById("modalText").innerText=text;


/* reset ดาวทุกครั้งที่เปิด */
let stars=document.querySelectorAll(".rating span");
stars.forEach(star=>{
star.style.color="lightgray";
});
}
function closeModal(){

document.getElementById("placeModal").style.display="none";

}

</script>

<script>

let places=[
"Luang Prabang",
"Ha Long Bay",
"Hoi An",
"HaNoi",
"Vientiane",
"Da Nang",
"SaiGon"
];

function showSuggestions(){

let input=document.getElementById("searchInput").value.toLowerCase();
let suggestionBox=document.getElementById("suggestions");

suggestionBox.innerHTML="";

if(input===""){
suggestionBox.style.display="none";
return;
}

places.forEach(function(place){

if(place.toLowerCase().startsWith(input)){

let div=document.createElement("div");
div.classList.add("suggestion-item");

div.innerText=place;

div.onclick=function(){
document.getElementById("searchInput").value=place;
suggestionBox.style.display="none";
};

suggestionBox.appendChild(div);

}

});

suggestionBox.style.display="block";

}

function searchPlace(){

let input=document.getElementById("searchInput").value.toLowerCase();

let places=document.getElementsByClassName("place-card");

for(let i=0;i<places.length;i++){

let text=places[i].innerText.toLowerCase();

if(text.includes(input)){
places[i].scrollIntoView({behavior:"smooth"});
break;
}

}

}

let likeCount = 0;

function likePlace(){

likeCount++;

document.getElementById("extraInfo").innerText =
"❤️ Likes: " + likeCount;

}

function showBestTime(){

document.getElementById("extraInfo").innerText =
"📅 Best time: March – May, September – November";

}

function openMap(){

let place = document.getElementById("modalTitle").innerText;

window.open("https://www.google.com/maps/search/" + place);

}

function rate(stars){

let allStars = document.querySelectorAll(".rating span");

allStars.forEach((star,index)=>{

if(index < stars){
star.style.color = "gold";
}else{
star.style.color = "lightgray";
}

});

}
function copyLink(){

let place=document.getElementById("modalTitle").innerText;

let link=window.location.href + "#" + place;

navigator.clipboard.writeText(link);

document.getElementById("extraInfo").innerText =
"🔗 Link copied!";

}
let comments = JSON.parse(localStorage.getItem("comments")) || [];

function saveComments(){
localStorage.setItem("comments", JSON.stringify(comments));
}

function renderComments(){

let list=document.getElementById("commentList");
list.innerHTML="";

comments.forEach((c,index)=>{

let li=document.createElement("li");
li.className="comment-item";

li.innerHTML=`
<span>${c.text}</span>

<div class="comment-actions">
<span onclick="likeComment(${index})">❤️ ${c.likes}</span>
<span onclick="deleteComment(${index})">🗑</span>
</div>
`;

list.appendChild(li);

});

}

function addComment(){

let input=document.getElementById("commentInput");

let text=input.value.trim();

if(text==="") return;

comments.push({
text:text,
likes:0
});

input.value="";

saveComments();
renderComments();

}

function deleteComment(index){

comments.splice(index,1);

saveComments();
renderComments();

}

function likeComment(index){

comments[index].likes++;

saveComments();
renderComments();

}

renderComments();
</script>
