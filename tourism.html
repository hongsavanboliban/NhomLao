<html lang="vi">

  <meta charset="UTF-8">
  <title>Du lịch | Lào – Việt Nam</title>

</head>
<body>

<nav>
  <a href="index.html">Trang chủ</a>
  <a href="tourism.html">Du lịch</a>
  <a href="food.html">Ẩm thực</a>

<!-- TOP DESTINATIONS -->
<section id="top-sites">
  <h2>Top Điểm Đến Phải Đi</h2>
  <input type="text" id="searchInput" placeholder="Tìm địa điểm...">
<button onclick="searchPlace()">Tìm</button>
  <div class="slider-container">

    <button class="slide-btn left" onclick="slideLeft()">❮</button>

    <div class="slider" id="slider">

        <div class="card">
            <img src="https://media.gettyimages.com/id/939742052/photo/luang-prabang-temple-in-the-heart-of-the-city.jpg?s=612x612&w=0&k=20&c=QAYxehnVn4A5RzyPO0WabntlEARFaA7vmK3xvERHP_Y=">
            <p>Luang Prabang</p>
        </div>

        <div class="card">
            <img src="https://res.klook.com/image/upload/w_750,h_469,c_fill,q_85/w_80,x_15,y_15,g_south_west,l_Klook_water_br_trans_yhcmh3/activities/qmgtdjekctlyucr8itqw.jpg">
            <p>Ha Long Bay</p>
        </div>

        <div class="card">
            <img src="img/hoi-an.jpg">
            <p>Hoi An</p>
        </div>

        <div class="card">
            <img src="img/hanoi.jpg">
            <p>Ha Noi</p>
        </div>

    </div>

    <button class="slide-btn right" onclick="slideRight()">❯</button>

</div>
</section>

<script>
function slideLeft(){
    document.getElementById("slider").scrollBy({
        left: -320,
        behavior: "smooth"
    });
}

function slideRight(){
    document.getElementById("slider").scrollBy({
        left: 320,
        behavior: "smooth"
    });
}
</script>


</body>
