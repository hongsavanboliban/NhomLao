<div id="placeModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<img id="modalImg">

<h2 id="modalTitle"></h2>

<p id="modalText"></p>

</div>

</div>



<script>
function slideLeft(){
    document.getElementById("slider").scrollBy({
        left: -320,
        behavior: "smooth"
    });
}

function slideRight(){
    document.getElementById("slider").scrollBy({
        left: 320,
        behavior: "smooth"
    });
}
</script>

<script>

function openModal(title,img,text){

document.getElementById("placeModal").style.display="flex";

document.getElementById("modalTitle").innerText=title;

document.getElementById("modalImg").src=img;

document.getElementById("modalText").innerText=text;

}

function closeModal(){

document.getElementById("placeModal").style.display="none";

}

</script>

<script>

let places=[
"Luang Prabang",
"Ha Long Bay",
"Hoi An",
"HaNoi",
"Vientiane",
"Da Nang",
"SaiGon"
];

function showSuggestions(){

let input=document.getElementById("searchInput").value.toLowerCase();
let suggestionBox=document.getElementById("suggestions");

suggestionBox.innerHTML="";

if(input===""){
suggestionBox.style.display="none";
return;
}

places.forEach(function(place){

if(place.toLowerCase().startsWith(input)){

let div=document.createElement("div");
div.classList.add("suggestion-item");

div.innerText=place;

div.onclick=function(){
document.getElementById("searchInput").value=place;
suggestionBox.style.display="none";
};

suggestionBox.appendChild(div);

}

});

suggestionBox.style.display="block";

}

function searchPlace(){

let input=document.getElementById("searchInput").value.toLowerCase();

let places=document.getElementsByClassName("place-card");

for(let i=0;i<places.length;i++){

let text=places[i].innerText.toLowerCase();

if(text.includes(input)){
places[i].scrollIntoView({behavior:"smooth"});
break;
}

}

}

</script>
